<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/setup/">
  <title>Altery — Business onboarding</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="tokens.css?v=1" />
  <link rel="stylesheet" href="onboarding-flow.css?v=9" />
  <link rel="stylesheet" href="onboarding-payment.css?v=3" />
  <link rel="stylesheet" href="i18n.css?v=1" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Stripe.js — exposes window.Stripe for the activation/payment screen.
       Loaded async so it doesn't block initial paint; the payment screen
       waits for window.Stripe and shows an inline loader until ready. -->
  <script src="https://js.stripe.com/v3/" async></script>
</head>
<body>
  <div id="root"></div>

  <!-- i18n (vanilla JS — loads synchronously before Babel JSX) -->
  <script src="i18n.js"></script>
  <script src="i18n-dict-ob.js"></script>
  <script src="i18n-dict-ob-de-ru.js"></script>
  <script src="i18n-dict-ob-nl-tr-it.js"></script>
  <script src="i18n-dict-ob-es-pl-pt-fr.js"></script>

  <!-- Shared design system + onboarding screens.
       Load order matters: primitives → components → onboarding atoms/shell →
       screens → app. Babel compiles each JSX inline; later files reference
       globals exported by earlier ones via Object.assign(window, ...). -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="flags.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="i18n-react.jsx"></script>
  <script type="text/babel" src="date-picker.jsx"></script>
  <script type="text/babel" src="phone-input.jsx"></script>
  <script type="text/babel" src="onboarding-atoms.jsx"></script>
  <script type="text/babel" src="onboarding-shell.jsx"></script>
  <script type="text/babel" src="onboarding-screens-1.jsx"></script>
  <script type="text/babel" src="onboarding-screens-2.jsx"></script>
  <script type="text/babel" src="onboarding-screens-payment.jsx"></script>
  <script type="text/babel" src="onboarding-app.jsx"></script>
</body>
</html>
