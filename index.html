<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Altery — Eligibility check</title>

  <!-- Favicon — Altery brand mark (4 dots: orange / blue / peach / grey).
       Served from /favicon.ico in the deploy root. The browser would also
       auto-find /favicon.ico without these link tags, but explicit tags
       are slightly faster and let us also serve the apple-touch-icon. -->
  <link rel="icon" type="image/png" sizes="65x65" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">

  <link rel="stylesheet" href="/checker.css">
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.development.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.development.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin="anonymous"></script>
  <!-- Stripe.js — canonical URL with trailing slash (Stripe-recommended;
       without it you get a 301 redirect which some script-tag loaders
       handle poorly). Async so it doesn't block render. EcPaymentModal
       uses ecLoadStripe() to handle this script's lifecycle properly,
       including load/error events and timeouts. -->
  <script src="https://js.stripe.com/v3/" async></script>
  <!-- PDF generation libs — used by the handoff modal's "Email me the
       full analysis" path. We load html2canvas and jsPDF as separate
       UMD scripts (rather than the html2pdf.bundle which wraps both
       in an IIFE without exposing globals) so we can call them
       directly. EcHandoffModal.sendEmail polls for both before kicking
       off the capture. Async load — total ~250KB, and most users skip
       the email path entirely. Pinned to stable versions because the
       canvas/PDF rendering surface is finicky enough that breakage
       on a minor bump is plausible. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" async></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" async></script>

  <!-- ============================================================================
       i18n — minimal runtime + EN dictionary. Architecturally extensible to the
       prototype's full 10-language system; here we ship English as the canonical
       source. LangSwitcher renders all 10 entries; selecting a non-EN locale
       falls back to EN via t()'s fallback chain.
       ============================================================================ -->
  <script>
    (function () {
      // Languages ordered by total global speakers (native + L2 / lingua-franca
       // use), based on publicly available Ethnologue/Wikipedia figures. Each
       // entry below shows the approximate speaker count that drives the order.
       // This is a public, defensible heuristic — NOT Altery analytics. Once
       // real usage data is available (% of users picking each language from
       // this switcher), reorder by descending share and update this comment.
       // Order rationale at this point in time:
       //   1.  English      — ~1.5 B  (lingua franca, default)
       //   2.  Spanish      — ~600 M  (Iberia + LATAM)
       //   3.  French       — ~320 M  (with francophone Africa)
       //   4.  Portuguese   — ~270 M  (PT + BR + lusophone Africa)
       //   5.  Russian      — ~260 M  (RU + CIS)
       //   6.  German       — ~135 M  (DACH + diaspora)
       //   7.  Italian      —  ~85 M
       //   8.  Turkish      —  ~85 M
       //   9.  Polish       —  ~45 M
       //  10.  Dutch        —  ~30 M
       // English stays first as the fallback (LangSwitcher uses LANGS[0]
       // when getLang() can't be resolved). detectInitial() defaults to "en"
       // by string literal, not LANGS[0], so the reorder is purely UI.
      const LANGS = [
        { code: "en", name: "English",    nativeName: "English",    flag: "GB" },
        { code: "es", name: "Spanish",    nativeName: "Español",    flag: "ES" },
        { code: "fr", name: "French",     nativeName: "Français",   flag: "FR" },
        { code: "pt", name: "Portuguese", nativeName: "Português",  flag: "PT" },
        { code: "ru", name: "Russian",    nativeName: "Русский",    flag: "RU" },
        { code: "de", name: "German",     nativeName: "Deutsch",    flag: "DE" },
        { code: "it", name: "Italian",    nativeName: "Italiano",   flag: "IT" },
        { code: "tr", name: "Turkish",    nativeName: "Türkçe",     flag: "TR" },
        { code: "pl", name: "Polish",     nativeName: "Polski",     flag: "PL" },
        { code: "nl", name: "Dutch",      nativeName: "Nederlands", flag: "NL" },
      ];
      const STORAGE_KEY = "altery.lang";
      const DICT = {};
      LANGS.forEach((l) => { DICT[l.code] = {}; });

      function detectInitial() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored && DICT[stored]) return stored;
        } catch (e) {}
        const nav = (navigator.language || "en").slice(0, 2).toLowerCase();
        if (DICT[nav]) return nav;
        return "en";
      }

      let currentLang = detectInitial();
      const listeners = new Set();

      function getLang() { return currentLang; }
      function setLang(code) {
        if (!DICT[code]) return;
        currentLang = code;
        try { localStorage.setItem(STORAGE_KEY, code); } catch (e) {}
        listeners.forEach((fn) => fn(code));
      }
      function onChange(fn) { listeners.add(fn); return () => listeners.delete(fn); }

      function t(key, vars) {
        let str = (DICT[currentLang] && DICT[currentLang][key])
               || (DICT.en && DICT.en[key]);
        if (str === undefined) {
          // Defensive fallback: if a namespaced key like "ec.country.EG"
          // or "ec.corridor.TR" misses both currentLang and EN dicts,
          // surface just the trailing code instead of the raw key. This
          // prevents internal-looking strings ("ec.country.EG") from
          // leaking into the UI when translation drift happens. Keys
          // outside our known namespaces fall through to the raw key,
          // which is intentional — it surfaces legitimate bugs during
          // QA without silently masking them.
          const m = /^ec\.(?:country|corridor)\.([A-Z]{2,5})$/.exec(key);
          str = m ? m[1] : key;
        }
        if (vars) {
          Object.keys(vars).forEach((k) => {
            str = str.replace(new RegExp("\\{" + k + "\\}", "g"), vars[k]);
          });
        }
        return str;
      }

      window.__I18N = { LANGS, DICT, getLang, setLang, onChange, t, STORAGE_KEY };
      window.t = t;
    })();
  </script>

  <!-- ============================================================================
       INLINE FLAGS — 247 country flag SVGs as base64 data URIs (no relative paths)
       ============================================================================ -->
  <script src="/inline-flags.js"></script>

  <!-- ============================================================================
       I18N DICTIONARIES — 10 languages, full prototype copy
       ============================================================================ -->
  <script src="/i18n-dict-ec.js"></script>
  <script src="/i18n-dict-ec-translations.js"></script>
  <script src="/i18n-dict-ec-nl-tr.js"></script>
  <script src="/i18n-dict-ec-it-es.js"></script>
  <script src="/i18n-dict-ec-pl-pt-fr.js"></script>
  <script src="/i18n-dict-ec-countries.js"></script>

  <!-- ============================================================================
       React app — components, atoms, eligibility checker. Everything renders
       through Babel-standalone in the browser; matches the prototype's load order.
       ============================================================================ -->

  <!-- Canonical AlteryPay DS Button + supporting btn-helpers + Spinner.
       Shared with /setup/index.html so the checker and onboarding render the
       same Button. Loaded BEFORE the inline block below, so window.Button is
       defined by the time the inline screens reference it. The inline block
       still defines the rest of the checker-specific components (Input, Tag,
       Alert, Select, etc.) — those are dual-defined for now and will migrate
       in follow-up commits. -->
  <script type="text/babel" data-presets="react" src="/components.jsx"></script>
  <!-- Shared icon set — JSX-based, used by both checker and onboarding. -->
  <script type="text/babel" data-presets="react" src="/icons.jsx"></script>
  <!-- Checker-only atoms (Title / Field / WhyWeAsk). References window.useT
       at render time; the inline block below exports it. -->
  <script type="text/babel" data-presets="react" src="/checker-atoms.jsx"></script>
  <!-- Checker question/result screens — EcIco + EcIntro..EcResultBlocked.
       Resolves cross-module refs (DS, data, helpers, modals) via window at
       render time. -->
  <script type="text/babel" data-presets="react" src="/checker-screens.jsx"></script>
  <!-- Checker modals — Fees, BankHistory, Perks, PlanComparison, Handoff,
       Payment. Resolves dependencies via window at render time. -->
  <script type="text/babel" data-presets="react" src="/checker-modals.jsx"></script>
  <!-- EC data constants — pure data, no JSX, loaded as a classic script so
       Babel never touches it. Exports EC_COUNTRIES, EC_PLANS, EC_ENTITIES …
       to window for the inline block below to reference unqualified. -->
  <script src="/checker-data.js"></script>
  <!-- EC pure helpers (ecRecommend, ecCurrencyFlag, ecComputeCostBreakdown,
       …). Loaded after /checker-data.js because the .currencies enrichment
       reads EC_ENTITIES at module-load time. Plain <script>; exports to window. -->
  <script src="/checker-helpers.js"></script>
  <!-- PDF-only assets (100 KB base64 logo + Calendly URL). Pulled out so the
       logo doesn't drown every git diff. Plain <script>; exports to window. -->
  <script src="/checker-pdf-assets.js"></script>
  <!-- PDF / email infrastructure — Stripe loader, jsPDF/html2canvas waiter,
       analysis HTML builder, email sender. Plain <script>; exports to window. -->
  <script src="/checker-pdf.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useLayoutEffect, useSyncExternalStore } = React;

    // ──────────────────── i18n React bindings ────────────────────
    function useT() {
      useSyncExternalStore(
        (cb) => window.__I18N.onChange(cb),
        () => window.__I18N.getLang(),
        () => window.__I18N.getLang()
      );
      return window.__I18N.t;
    }
    // Expose to global scope so /checker-atoms.jsx (loaded earlier) can
    // resolve useT at render time via the standard scope chain.
    window.useT = useT;

    // ──────────────────── Icon / ICONS ────────────────────
    // Moved to /icons.jsx (shared with /setup/index.html).
    // window.Icon, window.ICONS set there via Object.assign.

    // ──────────────────── Flag ────────────────────
    // Renders the inline base64 data URI for the country code from
    // window.__FLAGS (bootstrapped above). Falls back to a deterministic
    // 2-letter coloured badge disc for unknown codes — the prototype's
    // intentional fallback. Currency codes resolved via CURRENCY_TO_COUNTRY.
    const FLAG_FILES = new Set([
      "AD","AE","AF","AG","AI","AL","AM","AO","AQ","AR","AS","AT","AU","AW","AX",
      "AZ","BA","BB","BD","BE","BF","BG","BH","BI","BJ","BL","BM","BN","BO","BQ",
      "BR","BS","BT","BW","BY","BZ","CA","CC","CD","CF","CG","CH","CI","CK","CL",
      "CM","CN","CO","CR","CU","CV","CW","CX","CY","CZ","DE","DJ","DK","DM","DO",
      "DZ","EC","EE","EG","EH","ER","ES","ET","EU","FI","FJ","FK","FM","FO","FR",
      "GA","GB","GD","GE","GF","GG","GH","GI","GL","GM","GN","GP","GQ","GR","GS",
      "GT","GU","GW","GY","HK","HN","HR","HT","HU","ID","IE","IL","IM","IN","IO",
      "IQ","IR","IS","IT","JE","JM","JO","JP","KE","KG","KH","KI","KM","KN","KP",
      "KR","KW","KY","KZ","LA","LB","LC","LI","LK","LR","LS","LT","LU","LV","LY",
      "MA","MC","MD","ME","MF","MG","MH","MK","ML","MM","MN","MO","MP","MQ","MR",
      "MS","MT","MU","MV","MW","MX","MY","MZ","NA","NC","NE","NF","NG","NI","NL",
      "NO","NP","NR","NU","NZ","OM","PA","PE","PF","PG","PH","PK","PL","PM","PN",
      "PR","PS","PT","PW","PY","QA","RE","RO","RS","RU","RW","SA","SB","SC","SD",
      "SE","SG","SH","SI","SJ","SK","SL","SM","SN","SO","SR","SS","ST","SV","SX",
      "SY","SZ","TC","TD","TF","TG","TH","TJ","TK","TL","TM","TN","TO","TR","TT",
      "TV","TW","TZ","UA","UG","US","UY","UZ","VA","VC","VE","VG","VI","VN","VU",
      "WF","WS","YE","YT","ZA","ZM","ZW",
    ]);
    const CURRENCY_TO_COUNTRY = {
      GBP: "GB", USD: "US", EUR: "EU", AUD: "AU", CAD: "CA", CHF: "CH",
      CNY: "CN", DKK: "DK", HKD: "HK", IDR: "ID", INR: "IN", JPY: "JP",
      KRW: "KR", MXN: "MX", MYR: "MY", NOK: "NO", NZD: "NZ", PHP: "PH",
      PLN: "PL", RUB: "RU", SAR: "SA", SEK: "SE", SGD: "SG", THB: "TH",
      TRY: "TR", UAH: "UA", VND: "VN", ZAR: "ZA", AED: "AE",
    };

    const Flag = ({ code, size = 20, style }) => {
      if (!code) return null;
      const upper = String(code).toUpperCase();
      const country = CURRENCY_TO_COUNTRY[upper] || upper;

      // Inline base64 data URI (loaded from window.__FLAGS by the inline-flags
      // bootstrap script). Avoids relative paths so the artifact is fully
      // self-contained — works inside chat preview, file://, or any host.
      const dataUri = window.__FLAGS && window.__FLAGS[country];
      if (dataUri) {
        return (
          <img
            src={dataUri}
            width={size} height={size} alt="" aria-hidden="true"
            style={{
              flex: "0 0 auto", width: size, height: size,
              borderRadius: "50%", display: "inline-block",
              verticalAlign: "middle", objectFit: "cover", ...style,
            }}
          />
        );
      }

      // Unknown code → deterministic 2-letter badge disc
      const seed = (country.charCodeAt(0) * 31 + (country.charCodeAt(1) || 0)) % 360;
      const bg = `hsl(${seed} 32% 88%)`;
      const fg = `hsl(${seed} 38% 28%)`;
      return (
        <span aria-hidden="true" style={{
          flex: "0 0 auto", display: "inline-flex",
          alignItems: "center", justifyContent: "center",
          width: size, height: size, borderRadius: "50%",
          background: bg, color: fg,
          fontSize: Math.max(8, Math.round(size * 0.42)),
          fontWeight: 700, letterSpacing: "0.02em",
          fontFamily: "var(--ff)", lineHeight: 1, userSelect: "none",
          ...style,
        }}>
          {country.slice(0, 2)}
        </span>
      );
    };

    // ──────────────────── LangSwitcher ────────────────────
    function LangSwitcher({ onDark = true, anchorRight = true }) {
      useT();
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      const cur = window.__I18N.LANGS.find((l) => l.code === window.__I18N.getLang())
                || window.__I18N.LANGS[0];

      useEffect(() => {
        if (!open) return;
        const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
        document.addEventListener("mousedown", onDoc);
        document.addEventListener("keydown", onKey);
        return () => {
          document.removeEventListener("mousedown", onDoc);
          document.removeEventListener("keydown", onKey);
        };
      }, [open]);

      return (
        <div className={"lang-switcher" + (anchorRight ? " is-right" : " is-left")} ref={ref}>
          <button
            type="button"
            className={"lang-pill" + (onDark ? " is-dark" : " is-light")}
            onClick={() => setOpen((v) => !v)}
            aria-haspopup="listbox"
            aria-expanded={open}
          >
            <span className="lang-pill__flag"><Flag code={cur.flag} size={18} /></span>
            <span className="lang-pill__code">{cur.code.toUpperCase()}</span>
            <svg className="lang-pill__caret" viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
              <path d="m3 4.5 3 3 3-3" stroke="currentColor" strokeWidth="1.5" fill="none"
                    strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
          {open && (
            <ul className="lang-menu" role="listbox">
              {window.__I18N.LANGS.map((l) => (
                <li key={l.code}>
                  <button
                    type="button" role="option"
                    aria-selected={l.code === cur.code}
                    className={"lang-menu__item" + (l.code === cur.code ? " is-current" : "")}
                    onClick={() => { window.__I18N.setLang(l.code); setOpen(false); }}
                  >
                    <span className="lang-menu__flag"><Flag code={l.flag} size={18} /></span>
                    <span className="lang-menu__name">{l.nativeName}</span>
                    <span className="lang-menu__code">{l.code.toUpperCase()}</span>
                  </button>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    //  Everything that used to live inline below this point is now in its
    //  own module — see the <script src=…> tags at the top of <head>.
    //
    //    DS primitives  → /components.jsx
    //    Icon + ICONS   → /icons.jsx
    //    Atoms          → /checker-atoms.jsx
    //    EcIco + screens (incl. EcApp) → /checker-screens.jsx
    //    Modals (Fees / Perks / Handoff / Payment / …) → /checker-modals.jsx
    //    EC data        → /checker-data.js
    //    EC helpers     → /checker-helpers.js
    //    PDF assets     → /checker-pdf-assets.js
    //    PDF + email    → /checker-pdf.js
    //
    //  What stays inline:
    //    - useT (i18n React hook, exported to window so /checker-atoms.jsx
    //      and the rest can resolve it at render time)
    //    - FLAG_FILES, CURRENCY_TO_COUNTRY, Flag (coupled to the
    //      window.__FLAGS bootstrap higher up in this file)
    //    - LangSwitcher (checker-specific variant; setup has its own in
    //      /setup/i18n-react.jsx)
    //    - ReactDOM.createRoot(<EcApp />) mount call
    // ════════════════════════════════════════════════════════════════════════

    ReactDOM.createRoot(document.getElementById("root")).render(<EcApp />);
  </script>
</body>
</html>
