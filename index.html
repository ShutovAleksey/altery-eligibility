<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Altery — Eligibility check</title>

  <!-- Favicon — Altery brand mark (4 dots: orange / blue / peach / grey).
       Served from /favicon.ico in the deploy root. The browser would also
       auto-find /favicon.ico without these link tags, but explicit tags
       are slightly faster and let us also serve the apple-touch-icon. -->
  <link rel="icon" type="image/png" sizes="65x65" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">

  <link rel="stylesheet" href="/checker.css">

  <!-- Cookie consent — gates Microsoft Clarity (non-essential analytics /
       session recording) behind prior opt-in per UK PECR / EU ePrivacy.
       Clarity is NO LONGER loaded inline here; cookie-consent.js loads it
       only after the user clicks "Allow all". Essential cookies + Stripe
       (payment) are unaffected. Same module + project id runs on /setup. -->
  <script src="/cookie-consent.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel — SRI-pinned so a compromised CDN can't push a
       malicious build into the page. integrity= attrs computed from
       the current file contents 2026-05-29 (sha384). -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.development.min.js"
          integrity="sha384-kVcIFke//pMiDJN03as1hindWUCFzuk/YoOAqYJncf3ttAf6U+/j37y56B+NcoSk"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.development.min.js"
          integrity="sha384-a9D0JIXk1O+cyK1W0mGZHZoGxEwOFK/YEQZEbsDc633VdwautneyP4gIZQ4SyOBh"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"
          integrity="sha384-AISI5AuDG6E8DeEiFMVB3rGQxhZt24OU0avMp+GMV64+tpnA3+Z6F5MT0f96iPva"
          crossorigin="anonymous"></script>
  <!-- PDF generation libs — used by the handoff modal's "Email me the
       full analysis" path. We load html2canvas and jsPDF as separate
       UMD scripts (rather than the html2pdf.bundle which wraps both
       in an IIFE without exposing globals) so we can call them
       directly. EcHandoffModal.sendEmail polls for both before kicking
       off the capture. Async load — total ~250KB, and most users skip
       the email path entirely. Pinned to stable versions because the
       canvas/PDF rendering surface is finicky enough that breakage
       on a minor bump is plausible. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
          integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H"
          crossorigin="anonymous" async></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
          integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk"
          crossorigin="anonymous" async></script>

  <!-- ============================================================================
       i18n — minimal runtime + EN dictionary. Architecturally extensible to the
       prototype's full 10-language system; here we ship English as the canonical
       source. LangSwitcher renders all 10 entries; selecting a non-EN locale
       falls back to EN via t()'s fallback chain.
       ============================================================================ -->
  <script>
    (function () {
      // Languages ordered by total global speakers (native + L2 / lingua-franca
       // use), based on publicly available Ethnologue/Wikipedia figures. Each
       // entry below shows the approximate speaker count that drives the order.
       // This is a public, defensible heuristic — NOT Altery analytics. Once
       // real usage data is available (% of users picking each language from
       // this switcher), reorder by descending share and update this comment.
       // Order rationale at this point in time:
       //   1.  English      — ~1.5 B  (lingua franca, default)
       //   2.  Spanish      — ~600 M  (Iberia + LATAM)
       //   3.  French       — ~320 M  (with francophone Africa)
       //   4.  Portuguese   — ~270 M  (PT + BR + lusophone Africa)
       //   5.  Russian      — ~260 M  (RU + CIS)
       //   6.  German       — ~135 M  (DACH + diaspora)
       //   7.  Italian      —  ~85 M
       //   8.  Turkish      —  ~85 M
       //   9.  Polish       —  ~45 M
       //  10.  Dutch        —  ~30 M
       // English stays first as the fallback (LangSwitcher uses LANGS[0]
       // when getLang() can't be resolved). detectInitial() defaults to "en"
       // by string literal, not LANGS[0], so the reorder is purely UI.
      const LANGS = [
        { code: "en", name: "English",    nativeName: "English",    flag: "GB" },
        { code: "es", name: "Spanish",    nativeName: "Español",    flag: "ES" },
        { code: "fr", name: "French",     nativeName: "Français",   flag: "FR" },
        { code: "pt", name: "Portuguese", nativeName: "Português",  flag: "PT" },
        { code: "ru", name: "Russian",    nativeName: "Русский",    flag: "RU" },
        { code: "de", name: "German",     nativeName: "Deutsch",    flag: "DE" },
        { code: "it", name: "Italian",    nativeName: "Italiano",   flag: "IT" },
        { code: "tr", name: "Turkish",    nativeName: "Türkçe",     flag: "TR" },
        { code: "pl", name: "Polish",     nativeName: "Polski",     flag: "PL" },
        { code: "nl", name: "Dutch",      nativeName: "Nederlands", flag: "NL" },
      ];
      const STORAGE_KEY = "altery.lang";
      const DICT = {};
      LANGS.forEach((l) => { DICT[l.code] = {}; });

      // Priority chain:
      //   1. ?lang=xx URL param  — marketing links can force a locale
      //      (saved back to storage so it sticks across navigation,
      //      including the checker → /setup/ hop).
      //   2. localStorage         — user's previous explicit pick wins.
      //   3. navigator.languages  — walk the browser's full preference
      //      list, not just the first entry, so a user whose primary
      //      is unsupported still gets the best of their secondary
      //      preferences.
      //   4. "en"                 — ultimate fallback.
      function detectInitial() {
        try {
          const param = new URLSearchParams(window.location.search).get("lang");
          if (param) {
            const code = param.slice(0, 2).toLowerCase();
            if (DICT[code]) {
              try { localStorage.setItem(STORAGE_KEY, code); } catch (e) {}
              return code;
            }
          }
        } catch (e) {}
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored && DICT[stored]) return stored;
        } catch (e) {}
        const prefs = (navigator.languages && navigator.languages.length)
                    ? navigator.languages
                    : [navigator.language || "en"];
        for (let i = 0; i < prefs.length; i++) {
          const code = (prefs[i] || "").slice(0, 2).toLowerCase();
          if (DICT[code]) return code;
        }
        return "en";
      }

      let currentLang = detectInitial();
      const listeners = new Set();

      function getLang() { return currentLang; }
      function setLang(code) {
        if (!DICT[code]) return;
        currentLang = code;
        try { localStorage.setItem(STORAGE_KEY, code); } catch (e) {}
        listeners.forEach((fn) => fn(code));
      }
      function onChange(fn) { listeners.add(fn); return () => listeners.delete(fn); }

      function t(key, vars) {
        let str = (DICT[currentLang] && DICT[currentLang][key])
               || (DICT.en && DICT.en[key]);
        if (str === undefined) {
          // Defensive fallback: if a namespaced key like "ec.country.EG"
          // or "ec.corridor.TR" misses both currentLang and EN dicts,
          // surface just the trailing code instead of the raw key. This
          // prevents internal-looking strings ("ec.country.EG") from
          // leaking into the UI when translation drift happens. Keys
          // outside our known namespaces fall through to the raw key,
          // which is intentional — it surfaces legitimate bugs during
          // QA without silently masking them.
          const m = /^ec\.(?:country|corridor)\.([A-Z]{2,5})$/.exec(key);
          str = m ? m[1] : key;
        }
        if (vars) {
          Object.keys(vars).forEach((k) => {
            str = str.replace(new RegExp("\\{" + k + "\\}", "g"), vars[k]);
          });
        }
        return str;
      }

      window.__I18N = { LANGS, DICT, getLang, setLang, onChange, t, STORAGE_KEY };
      window.t = t;
    })();
  </script>

  <!-- ============================================================================
       INLINE FLAGS — 247 country flag SVGs as base64 data URIs (no relative paths)
       ============================================================================ -->
  <script src="/inline-flags.js"></script>

  <!-- ============================================================================
       I18N DICTIONARIES — 10 languages, full prototype copy
       ============================================================================ -->
  <script src="/i18n-dict-ec.js"></script>
  <script src="/i18n-dict-ec-translations.js"></script>
  <script src="/i18n-dict-ec-nl-tr.js"></script>
  <script src="/i18n-dict-ec-it-es.js"></script>
  <script src="/i18n-dict-ec-pl-pt-fr.js"></script>
  <script src="/i18n-dict-ec-countries.js"></script>

  <!-- ============================================================================
       React app — components, atoms, eligibility checker. Everything renders
       through Babel-standalone in the browser; matches the prototype's load order.
       ============================================================================ -->

  <!-- Canonical AlteryPay DS Button + supporting btn-helpers + Spinner.
       Shared with /setup/index.html so the checker and onboarding render the
       same Button. Loaded BEFORE the inline block below, so window.Button is
       defined by the time the inline screens reference it. The inline block
       still defines the rest of the checker-specific components (Input, Tag,
       Alert, Select, etc.) — those are dual-defined for now and will migrate
       in follow-up commits. -->
  <script type="text/babel" data-presets="react" src="/components.jsx"></script>
  <!-- Shared icon set — JSX-based, used by both checker and onboarding. -->
  <script type="text/babel" data-presets="react" src="/icons.jsx"></script>
  <!-- Checker-specific i18n React UI: useT hook, round Flag component,
       LangSwitcher pill. Loaded ahead of the rest so window.useT and
       window.Flag are set before any consumer renders. -->
  <script type="text/babel" data-presets="react" src="/checker-flag-lang.jsx"></script>
  <!-- Checker-only atoms (Title / Field / WhyWeAsk). References window.useT
       at render time; the inline block below exports it. -->
  <script type="text/babel" data-presets="react" src="/checker-atoms.jsx"></script>
  <!-- Checker question/result screens — EcIco + EcIntro..EcResultBlocked.
       Resolves cross-module refs (DS, data, helpers, modals) via window at
       render time. -->
  <script type="text/babel" data-presets="react" src="/checker-screens.jsx"></script>
  <!-- Checker modals — Fees, BankHistory, Perks, PlanComparison, Handoff,
       Payment. Resolves dependencies via window at render time. -->
  <script type="text/babel" data-presets="react" src="/checker-modals.jsx"></script>
  <!-- EC data constants — pure data, no JSX, loaded as a classic script so
       Babel never touches it. Exports EC_COUNTRIES, EC_PLANS, EC_ENTITIES …
       to window for the inline block below to reference unqualified. -->
  <script src="/checker-data.js"></script>
  <!-- EC pure helpers (ecRecommend, ecCurrencyFlag, ecComputeCostBreakdown,
       …). Loaded after /checker-data.js because the .currencies enrichment
       reads EC_ENTITIES at module-load time. Plain <script>; exports to window. -->
  <script src="/checker-helpers.js"></script>
  <!-- PDF-only assets (100 KB base64 logo + booking URL). Pulled out so the
       logo doesn't drown every git diff. Plain <script>; exports to window. -->
  <script src="/checker-pdf-assets.js"></script>
  <!-- PDF / email infrastructure — Stripe loader, jsPDF/html2canvas waiter,
       analysis HTML builder, email sender. Plain <script>; exports to window. -->
  <script src="/checker-pdf.js"></script>

  <!-- All checker code now lives in the modules loaded above. EcApp itself
       is defined in /checker-screens.jsx and exposed via window.EcApp;
       the React-hook destructure (useState/useEffect/…) is owned by
       /checker-flag-lang.jsx so the classic-script Lexical Declarations
       slot resolves them at render time for every other extracted file. -->
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById("root")).render(<EcApp />);
  </script>
</body>
</html>
